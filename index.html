<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>תרשתי משמע</title>

<style>
:root{
  --bg:#000;
  --text:#f4f4f4;
  --muted:rgba(255,255,255,.7);
  --line:rgba(255,255,255,.12);
  --orange:#f7941d;
  --radius:18px;
  --shadow:0 16px 48px rgba(0,0,0,.55);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:64px;
  z-index:50;
  background:#000;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
}

.brand{
  font-weight:900;
  font-size:22px;
}
.brand span{color:var(--orange)}

.hud{
  display:flex;
  gap:10px;
}

.pill{
  padding:6px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.2);
  font-size:12px;
}

/* ================= MAIN ================= */

main{
  position:relative;
  padding-top:80px;
  padding-bottom:140px;
  min-height:100svh;
}

/* ================= MAP LAYOUT ================= */

.mapLayout{
  display:grid;
  grid-template-columns: 1fr 380px;
  gap:16px;
  padding:16px;
  align-items:start;
}

.mapPanel{
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
}

.gridFrame{
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  aspect-ratio:1/1;
  max-height:calc(100svh - 240px);
}

.gridFrame.zoomed{
  overflow:auto;
}

.diamondGrid{
  display:grid;
  gap:6px;
  transform-origin:center center;
}

.dcell{
  width:32px;
  height:32px;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
}

/* ================= TILES ================= */

.tilesGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:12px;
  padding:16px;
}

.tile{
  background:linear-gradient(180deg,#ffa03b,#e87b00);
  border-radius:16px;
  padding:12px;
  position:relative;
  height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  font-weight:900;
  color:#000;
}

.tile small{
  position:absolute;
  top:8px;
  right:8px;
  background:#fff;
  border-radius:999px;
  padding:4px 8px;
  font-size:10px;
}

/* ================= BOTTOM TABS ================= */

.tabs{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#000;
  border-top:1px solid var(--line);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  z-index:40;
}

.tab{
  padding:12px 24px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.2);
  cursor:pointer;
}

.tab.active{
  background:rgba(255,255,255,.1);
}

/* ================= FOOTER ================= */

footer{
  position:fixed;
  bottom:70px;
  left:0;
  right:0;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  border-top:1px solid var(--line);
  font-size:14px;
  color:var(--orange);
}

/* ================= MOBILE ================= */

@media(max-width:900px){

  .mapLayout{
    grid-template-columns:1fr;
  }

  .tilesGrid{
    grid-template-columns:repeat(5,1fr);
  }

  .tile{
    height:80px;
    font-size:26px;
  }

  .tile{
    align-items:center;
    justify-content:center;
  }

  .tile{
    transform:translateY(6px);
  }
}

.hidden{display:none}
</style>
</head>

<body>

<header>
  <div class="brand">תרשתי <span>משמע</span></div>
  <div class="hud">
    <div class="pill">🧩 0</div>
    <div class="pill">📐 0%</div>
  </div>
</header>

<main>

<section id="mapSection">

<div class="mapLayout">

  <div class="gridFrame" id="gridFrame">
    <div class="diamondGrid" id="grid"></div>
  </div>

  <div class="mapPanel">
    <h3>מפה</h3>
    <p class="muted">בחר אריח → לחץ על משבצת</p>
    <button onclick="fit()">איפוס</button>
    <button onclick="zoomIn()">+</button>
    <button onclick="zoomOut()">-</button>
  </div>

</div>

</section>

<section id="tilesSection" class="hidden">
  <div class="tilesGrid" id="tiles"></div>
</section>

</main>

<footer>להכניס עניין לתוכן</footer>

<div class="tabs">
  <div class="tab active" onclick="showMap()">מפה</div>
  <div class="tab" onclick="showTiles()">אריחים</div>
</div>

<script>

const W=20;
const H=20;
const CELL=32;
const GAP=6;

const grid=document.getElementById("grid");
const gridFrame=document.getElementById("gridFrame");

let zoom=1;

function buildGrid(){
  grid.style.gridTemplateColumns=`repeat(${W},${CELL}px)`;
  grid.innerHTML="";
  for(let i=0;i<W*H;i++){
    const c=document.createElement("div");
    c.className="dcell";
    grid.appendChild(c);
  }
}

function applyScale(){
  const natural=(W*CELL)+(W-1)*GAP;
  const rect=gridFrame.getBoundingClientRect();
  const scale=Math.min(
    (rect.width-20)/natural,
    (rect.height-20)/natural
  );

  if(zoom<=1){
    grid.style.transform=`scale(${scale})`;
  }else{
    grid.style.transform=`scale(${zoom})`;
  }
}

function fit(){zoom=1;applyScale()}
function zoomIn(){zoom+=0.2;applyScale()}
function zoomOut(){zoom=Math.max(1,zoom-0.2);applyScale()}

function showMap(){
  document.getElementById("mapSection").classList.remove("hidden");
  document.getElementById("tilesSection").classList.add("hidden");
}

function showTiles(){
  document.getElementById("tilesSection").classList.remove("hidden");
  document.getElementById("mapSection").classList.add("hidden");
}

function buildTiles(){
  const wrap=document.getElementById("tiles");
  wrap.innerHTML="";
  for(let i=0;i<40;i++){
    const t=document.createElement("div");
    t.className="tile";
    t.innerHTML=`<small>פתרו כבר</small>${Math.floor(Math.random()*10)}`;
    wrap.appendChild(t);
  }
}

buildGrid();
buildTiles();
applyScale();
window.addEventListener("resize",applyScale);

</script>

</body>
</html>
